name: Build Windows EXE

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      PYTHON_VERSION: "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('app.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install `
            nuitka `
            ordered-set `
            zstandard `
            pillow

          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }

      - name: Build standalone app
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=tk-inter `
            --windows-console-mode=disable `
            --include-package=PIL `
            --assume-yes-for-downloads `
            --output-dir=build `
            --output-filename=MinecraftPluginAutoUpdateChecker.exe `
            app.py

      - name: Compress build
        run: |
          Compress-Archive `
            -Path build/app.dist/* `
            -DestinationPath MinecraftPluginAutoUpdateChecker-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftPluginAutoUpdateChecker-windows
          path: MinecraftPluginAutoUpdateChecker-windows.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: MinecraftPluginAutoUpdateChecker-windows.zip
